name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python helpers
        run: python -m py_compile build/write-manifest.py
      - name: Check shell syntax
        run: sh -n build/build-insightface.sh

